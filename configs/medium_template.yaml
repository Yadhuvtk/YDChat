# Shape template for a medium-scale run.
# Fill values after sizing to your hardware budget.
model:
  vocab_size: 32000
  seq_len: 4096
  n_layers: 24
  d_model: 1536
  n_heads: 24
  mlp_ratio: 4.0
  dropout: 0.1
  rms_norm_eps: 1.0e-5
  rope_theta: 10000.0
  init_std: 0.02
  tie_embeddings: true

optim:
  lr: 1.5e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
  fused: true

train:
  micro_batch_size: 1
  grad_accum_steps: 64
  max_steps: 20000
  warmup_steps: 500
  log_interval: 20
  eval_interval: 200
  eval_batches: 40
  save_interval: 200
  max_grad_norm: 1.0
  precision: bf16
  compile: true

data:
  train_path: data/train
  val_path: data/val
  tokenizer_path: artifacts/tokenizer/ydchat.model
  jsonl_key: text
  num_workers: 4

runtime:
  output_dir: checkpoints/medium
  device: cuda
  seed: 1337

sft:
  data_path: data/sft/train.jsonl
  val_fraction: 0.05
  max_samples: null
